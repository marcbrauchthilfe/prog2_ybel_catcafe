name: Cat Cafe Pipeline

on:
    push:
        branches: [master]
    pull_request:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
              - uses: actions/checkout@v6
              - uses: actions/setup-java@v5
                with:
                    java-version: 25
                    distribution: temurin
              - run: ./gradlew classes


    junit:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
            - run: ./gradlew test

    spotless:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-java@v5
              with:
                java-version: 25
                distribution: temurin
            - run: ./gradlew spotlessCheck
